name: Cypress Regression Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cypress Execution
        # Uses the official Cypress Action (Industry Standard)
        uses: cypress-io/github-action@v6
        with:
          # Use npm install to fix lockfile sync issues in CI
          install-command: npm install
          command: npm run cypress:run

      - name: Generate Allure Report
        if: always()
        run: |
          # The correct package name is allure-commandline
          npx allure-commandline generate allure-results --clean -o allure-report

      - name: Upload Allure Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots